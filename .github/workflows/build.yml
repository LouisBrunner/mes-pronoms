name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  test:
    uses: LouisBrunner/.github/.github/workflows/lint-bun.yml@main
    permissions:
      contents: read
    with:
      run: |
        bun run test:ci

  build:
    name: Build
    runs-on: ubuntu-24.04
    needs: [test]
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Bun
        uses: LouisBrunner/.github/.github/actions/setup-bun@main

      - name: Build
        run: |
          bun install
          bun run build

      - name: Upload Pages artifact
        uses: LouisBrunner/.github/.github/actions/upload-pages@main
        with:
          path: dist

  deploy:
    name: Deploy
    needs: [build]
    if: github.ref_name == 'main'
    permissions:
      pages: write
      id-token: write
    uses: LouisBrunner/.github/.github/workflows/deploy-pages.yml@main
